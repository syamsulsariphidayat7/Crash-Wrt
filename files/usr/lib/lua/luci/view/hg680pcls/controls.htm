<%+header%>
<div class="cbi-section">
  <div class="cbi-value">
    <div class="cbi-value-title"><%:Kontrol%></div>
    <div class="cbi-value-field">
      <form class="inline" method="post" action="<%=url('admin/services/hg680pcls/action')%>">
        <input type="hidden" name="do" value="start" />
        <button class="btn btn-success btn-sm" type="submit">
          <i class="glyphicon glyphicon-play"></i> <%:Start%>
        </button>
      </form>
      <form class="inline" method="post" action="<%=url('admin/services/hg680pcls/action')%>" style="margin-left:6px">
        <input type="hidden" name="do" value="stop" />
        <button class="btn btn-danger btn-sm" type="submit">
          <i class="glyphicon glyphicon-stop"></i> <%:Stop%>
        </button>
      </form>
      <form class="inline" method="post" action="<%=url('admin/services/hg680pcls/action')%>" style="margin-left:6px">
        <input type="hidden" name="do" value="restart" />
        <button class="btn btn-primary btn-sm" type="submit">
          <i class="glyphicon glyphicon-refresh"></i> <%:Restart%>
        </button>
      </form>
    </div>
  </div>
  <div class="cbi-value-description">
    <%:Gunakan tombol di atas untuk mengontrol service tanpa SSH.%>
  </div>
</div>
<%+footer%>
